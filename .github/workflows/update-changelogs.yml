name: Update Changelogs

on:
  # Run daily at 00:00 UTC
  schedule:
    - cron: '0 0 * * *'

  # Allow manual trigger from Actions tab
  workflow_dispatch:
  
  # Run when pushed to master branch
  push:
    branches:
      - master
    paths-ignore:
      - 'changelogs/**'  # Avoid infinite loop when workflow pushes changelog changes
      - '.last-update'   # Avoid infinite loop when workflow pushes keep-alive changes

# Prevent concurrent runs from conflicting with each other
concurrency:
  group: "update-changelogs"
  cancel-in-progress: true

# Permissions for this workflow
permissions:
  contents: write  # Allow reading and writing to repository

jobs:
  update-changelogs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0  # Get full history for merging
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install -g json
          
      - name: Clone PocketMine-MP repository
        run: |
          git clone --depth 1 --branch stable --single-branch https://github.com/pmmp/PocketMine-MP.git /tmp/pmmp
          
      - name: Update changelogs
        run: |
          # Create changelogs directory if it doesn't exist
          mkdir -p changelogs
          
          # Copy changelog files from PocketMine-MP repo
          cp -f /tmp/pmmp/changelogs/*.md changelogs/
          
          # Create a list of all changelog files and sort them in descending order
          cd changelogs
          CHANGELOG_FILES=$(ls -1 *.md | sort -V -r)
          
          # Create JSON array from the file list
          JSON_ARRAY="["
          FIRST=true
          for file in $CHANGELOG_FILES; do
            if [ "$FIRST" = true ]; then
              JSON_ARRAY="$JSON_ARRAY\"$file\""
              FIRST=false
            else
              JSON_ARRAY="$JSON_ARRAY, \"$file\""
            fi
          done
          JSON_ARRAY="$JSON_ARRAY]"
          
          # Create JSON object and save to versions.json
          echo "{\"versions\": $JSON_ARRAY}" | json -o json-4 > versions.json
          
          # Count changelogs
          TOTAL_CHANGELOGS=$(echo "$CHANGELOG_FILES" | wc -l)
          
          # Get newest and oldest versions
          NEWEST_VERSION=$(echo "$CHANGELOG_FILES" | head -n 1 | sed 's/\.md$//')
          OLDEST_VERSION=$(echo "$CHANGELOG_FILES" | tail -n 1 | sed 's/\.md$//')
          
          # Count by type
          STABLE_COUNT=$(echo "$CHANGELOG_FILES" | grep -v -E "(alpha|beta)" | wc -l)
          BETA_COUNT=$(echo "$CHANGELOG_FILES" | grep -E "beta" | wc -l)
          ALPHA_COUNT=$(echo "$CHANGELOG_FILES" | grep -E "alpha" | wc -l)
          
          # Create summary.md
          echo "# PocketMine-MP Changelogs Summary" > summary.md
          echo "" >> summary.md
          echo "**Total Changelogs:** ${TOTAL_CHANGELOGS}" >> summary.md
          echo "" >> summary.md
          echo "## Version Range" >> summary.md
          echo "- **Newest:** ${NEWEST_VERSION}" >> summary.md
          echo "- **Oldest:** ${OLDEST_VERSION}" >> summary.md
          echo "" >> summary.md
          echo "## Version Types" >> summary.md
          echo "- **Stable:** ${STABLE_COUNT}" >> summary.md
          echo "- **Beta:** ${BETA_COUNT}" >> summary.md
          echo "- **Alpha:** ${ALPHA_COUNT}" >> summary.md
          echo "" >> summary.md
          echo "## All Versions (Newest to Oldest)" >> summary.md
          echo "$CHANGELOG_FILES" | sed 's/\.md$//' | sed 's/^/- /' >> summary.md
          echo "" >> summary.md
          echo "_Last updated: $(date -u +"%Y-%m-%dT%H:%M:%SZ")_" >> summary.md
          
          # Report results
          echo "Updated ${TOTAL_CHANGELOGS} changelog files"
          cd ..
          
      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Pull latest changes, fallback to merge if rebase fails
          git pull --rebase origin ${{ github.ref_name }} || git pull --no-rebase origin ${{ github.ref_name }}
          
          git add changelogs/
          if ! git diff --quiet --staged; then
            git commit -m "chore: Update changelogs"
            git push origin ${{ github.ref_name }}
          fi

      # Keep-alive: update a timestamp file to prevent GitHub from
      # disabling the scheduled workflow after 60 days of inactivity.
      # This only runs on schedule events.
      - name: Keep workflow alive
        if: github.event_name == 'schedule'
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .last-update
          git add .last-update
          if ! git diff --quiet --staged; then
            git commit -m "chore: Keep workflow alive [skip ci]"
            git push origin ${{ github.ref_name }}
          fi